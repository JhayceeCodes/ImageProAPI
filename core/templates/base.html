{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageProAPI</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white shadow-md py-4">
        <div class="container mx-auto flex justify-between items-center px-6">
            <a href="{% url 'home' %}" class="text-2xl font-bold text-blue-600">
            ImageProAPI
            </a>

            <div>
                <a href="{% url 'api-docs' %}" class="text-gray-600 hover:text-blue-600 mx-2">
                    Docs
                </a>

                <a href="https://github.com/JhayceeCodes/ImageProAPI"
                   class="text-gray-600 hover:text-blue-600 mx-2">
                   GitHub
                </a>

                <a href="https://www.linkedin.com/in/jethroayegbe/"
                   class="text-gray-600 hover:text-blue-600 mx-2">
                   Contact
                </a>
            </div>
        </div>
    </nav>


    <!-- Page Content -->
    <main class="flex-grow">
        {% block content %}
        {% endblock %}
    </main>


    <!-- Footer -->
    <footer class="bg-white shadow-inner py-6">
        <div class="container mx-auto text-center text-gray-500">
            &copy; 2026 ImageProAPI. All rights reserved.
        </div>
    </footer>

</body>
</html>
